<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 24px;
      max-width: 620px;
      margin: 0 auto 20px;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* connect panel */
    #connect-panel {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #connect-panel label {
      font-size: .9rem;
      color: #555;
      white-space: nowrap;
    }

    select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .95rem;
      background: #fafafa;
      flex: 1;
      min-width: 140px;
      cursor: pointer;
    }

    select:disabled { opacity: .5; cursor: not-allowed; }

    button#connect-btn {
      padding: 8px 22px;
      border: none;
      border-radius: 8px;
      background: #4f7ef8;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    button#connect-btn:hover:not(:disabled) { background: #3a6ae0; }
    button#connect-btn:disabled { opacity: .6; cursor: not-allowed; }
    button#connect-btn.active { background: #e55; }
    button#connect-btn.active:hover:not(:disabled) { background: #c33; }

    #error-msg {
      display: none;
      margin-top: 10px;
      padding: 8px 14px;
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      border-radius: 8px;
      color: #c0392b;
      font-size: .88rem;
    }

    /* user list */
    #user-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #user-list li {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .93rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #user-list li.connected   { background: #edfaf3; }
    #user-list li.disconnected { background: #f7f7f7; color: #888; }

    .dot { font-size: 1rem; }
    .dot.green { color: #27ae60; }
    .dot.gray  { color: #bbb; }

    #user-list a {
      color: #4f7ef8;
      text-decoration: none;
      font-size: .85rem;
      word-break: break-all;
    }

    #user-list a:hover { text-decoration: underline; }

    em { font-size: .85rem; }
  </style>
</head>
<body>
  <div style="max-width:620px;margin:0 auto;">
    <h1>🔗 Relay Dashboard</h1>

    <div class="card">
      <h2>내 연결</h2>
      <div id="connect-panel">
        <label for="user-select">이름 선택:</label>
        <select id="user-select"><option disabled selected>로딩 중…</option></select>
        <button id="connect-btn">Connect</button>
      </div>
      <div id="error-msg"></div>
    </div>

    <div class="card">
      <h2>연결 현황</h2>
      <ul id="user-list"></ul>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/agent.js"></script>
</body>
</html>
