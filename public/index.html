<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      padding: 32px 16px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 24px;
      margin-bottom: 20px;
      border: 2px solid transparent;
      transition: background .25s, border-color .25s;
    }

    .card.connected {
      border-color: #27ae60;
      background: #f0faf4;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .card-header h2 { margin-bottom: 0; }

    /* ── 레이아웃 ───────────────────────────────────────────── */
    #page-header {
      max-width: 1100px;
      margin: 0 auto;
    }

    #main-layout {
      display: flex;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
      align-items: flex-start;
    }

    #left-panel {
      width: 400px;
      flex-shrink: 0;
    }

    #right-panel {
      flex: 1;
      min-width: 0;
    }

    @media (max-width: 860px) {
      #main-layout { flex-direction: column; }
      #left-panel { width: 100%; }
    }

    /* ── 연결 패널 ─────────────────────────────────────────── */
    #connect-panel {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #connect-panel label {
      font-size: .9rem;
      color: #555;
      white-space: nowrap;
    }

    select {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .95rem;
      background: #fafafa;
      flex: 1;
      min-width: 140px;
      cursor: pointer;
    }

    select:disabled { opacity: .5; cursor: not-allowed; }

    button#connect-btn {
      padding: 8px 22px;
      border: none;
      border-radius: 8px;
      background: #4f7ef8;
      color: #fff;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    button#connect-btn:hover:not(:disabled) { background: #3a6ae0; }
    button#connect-btn:disabled { opacity: .6; cursor: not-allowed; }
    button#connect-btn.active { background: #e55; }
    button#connect-btn.active:hover:not(:disabled) { background: #c33; }

    #error-msg {
      display: none;
      margin-top: 10px;
      padding: 8px 14px;
      background: #fff0f0;
      border: 1px solid #f5c2c2;
      border-radius: 8px;
      color: #c0392b;
      font-size: .88rem;
    }

    /* ── 유저 목록 ─────────────────────────────────────────── */
    #user-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #user-list li {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: .93rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #user-list li.connected    { background: #edfaf3; }
    #user-list li.disconnected { background: #f7f7f7; color: #888; }

    .dot { font-size: 1rem; }
    .dot.green { color: #27ae60; }
    .dot.gray  { color: #bbb; }

    #user-list a {
      color: #4f7ef8;
      text-decoration: none;
      font-size: .85rem;
      word-break: break-all;
    }
    #user-list a:hover { text-decoration: underline; }

    em { font-size: .85rem; }

    /* ── 테스트 버튼 ───────────────────────────────────────── */
    .btn-test {
      margin-left: auto;
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: .8rem;
      cursor: pointer;
      color: #555;
      flex-shrink: 0;
      transition: background .1s, color .1s, border-color .1s;
    }
    .btn-test:hover { background: #f0f0f0; }
    .btn-test.active {
      background: #4f7ef8;
      color: #fff;
      border-color: #4f7ef8;
    }

    /* ── API 테스터 카드 ───────────────────────────────────── */
    .btn-close {
      padding: 3px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      font-size: .8rem;
      cursor: pointer;
      color: #555;
    }
    .btn-close:hover { background: #f0f0f0; }

    .tester-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    #tester-method {
      flex: 0 0 110px;
      min-width: 0;
    }

    #tester-path {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .9rem;
      font-family: monospace;
    }

    .section-label {
      font-size: .82rem;
      font-weight: 600;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }

    .header-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }

    .header-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: .85rem;
    }

    .btn-remove-header {
      padding: 4px 8px;
      border: 1px solid #eee;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #c0392b;
      font-size: .85rem;
      flex-shrink: 0;
    }
    .btn-remove-header:hover { background: #fdecea; }

    #add-header-btn {
      font-size: .82rem;
      color: #4f7ef8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 14px;
      display: block;
    }
    #add-header-btn:hover { text-decoration: underline; }

    #body-section {
      margin-bottom: 14px;
    }

    #tester-body {
      width: 100%;
      min-height: 80px;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: .85rem;
      font-family: monospace;
      resize: vertical;
    }

    #tester-send {
      width: 100%;
      padding: 10px;
      background: #4f7ef8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #tester-send:hover:not(:disabled) { background: #3a6ae0; }
    #tester-send:disabled { opacity: .6; cursor: not-allowed; }

    /* 응답 영역 */
    .tester-response {
      margin-top: 16px;
      border-top: 1px solid #e8e8e8;
      padding-top: 14px;
    }

    .tester-response h4 {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #888;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tester-response pre {
      background: #f8f9fb;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: .82rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      color: #333;
      margin-top: 8px;
    }

    /* 상태 배지 */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .badge.ok   { background: #e6f9ef; color: #1a7a42; }
    .badge.warn { background: #fff7e0; color: #a06000; }
    .badge.err  { background: #fdecea; color: #c0392b; }
  </style>
</head>
<body>
  <div id="page-header">
    <h1>🔗 Relay Dashboard</h1>
  </div>

  <div id="main-layout">
    <!-- 왼쪽: 연결 + 연결 현황 -->
    <div id="left-panel">
      <div class="card" id="connect-card">
        <h2>내 연결</h2>
        <div id="connect-panel">
          <label for="user-select">이름 선택:</label>
          <select id="user-select"><option disabled selected>로딩 중…</option></select>
          <button id="connect-btn">Connect</button>
        </div>
        <div id="error-msg"></div>
      </div>

      <div class="card">
        <h2>연결 현황</h2>
        <ul id="user-list"></ul>
      </div>
    </div>

    <!-- 오른쪽: API 테스터 (선택 시 표시) -->
    <div id="right-panel" style="display:none">
      <div class="card" id="tester-card">
        <div class="card-header">
          <h2>API 테스터 — <span id="tester-target-name"></span></h2>
          <button class="btn-close" id="tester-close-btn">✕ 닫기</button>
        </div>

        <div class="tester-row">
          <select id="tester-method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>PATCH</option>
            <option>DELETE</option>
          </select>
          <input type="text" id="tester-path" placeholder="/api/example" />
        </div>

        <span class="section-label">Headers</span>
        <div id="header-rows"></div>
        <button id="add-header-btn">+ 헤더 추가</button>

        <div id="body-section">
          <span class="section-label">Body</span>
          <textarea id="tester-body" placeholder='{"key": "value"}'></textarea>
        </div>

        <button id="tester-send">보내기</button>

        <div class="tester-response" id="tester-response" style="display:none">
          <h4>응답 <span id="tester-status-badge" class="badge"></span></h4>
          <pre id="tester-response-body"></pre>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/agent.js"></script>
</body>
</html>
